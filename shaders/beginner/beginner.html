<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Title</title>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
    <script>
      let loadedShader;
      function preload() {
        loadedShader = loadShader( './shaders/beginner.vert',  './shaders/beginner.frag');
      }

      function setup() {
        createCanvas(600, 600, WEBGL);

        shader(loadedShader);

        noStroke();
      }

      function draw() {
        clear();

        loadedShader.setUniform('uTime', millis() / 1000);

        rect(0, 0, width, height);
      }
    </script>
  </body>
</html>
